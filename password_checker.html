<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #0d1117;
    color: #c9d1d9;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    width: 100%;
    max-width: 700px;
  }

  h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    color: #00e5ff;
    text-align: center;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: #8b949e;
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }

  .progress-section { margin-bottom: 2rem; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: #8b949e;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .progress-bar-bg {
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 0.5s ease, background 0.5s ease;
    background: #e74c3c;
  }

  .input-label {
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: #8b949e;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: block;
  }

  input[type="text"] {
    width: 100%;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 14px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: #e6edf3;
    outline: none;
    transition: border-color 0.3s;
    letter-spacing: 2px;
    margin-bottom: 1rem;
  }

  input[type="text"]:focus { border-color: #00e5ff; }

  .strength-label {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 3px;
    margin: 1rem 0 1.5rem;
    text-transform: uppercase;
    color: #8b949e;
    transition: color 0.4s;
  }

  .checks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    color: #8b949e;
    transition: all 0.3s ease;
  }

  .check-item.pass {
    border-color: #00e5ff33;
    background: #00e5ff0a;
    color: #00e5ff;
  }

  .check-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #30363d;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .check-item.pass .check-dot {
    background: #00e5ff;
    box-shadow: 0 0 6px #00e5ff88;
  }

  .python-section {
    margin-top: 2rem;
    border-top: 1px solid #21262d;
    padding-top: 1.5rem;
  }

  .python-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: #8b949e;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  pre {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 1.2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    color: #e6edf3;
    overflow-x: auto;
    line-height: 1.7;
  }

  .kw { color: #ff7b72; }
  .fn { color: #d2a8ff; }
  .st { color: #a5d6ff; }
  .cm { color: #8b949e; }
  .nm { color: #79c0ff; }
</style>
</head>
<body>
<div class="container">

  <h1>Password Checker</h1>
  <p class="subtitle">Strength Analyzer Tool</p>

  <div class="progress-section">
    <div class="progress-header">
      <span>Progress</span>
      <span id="score-label">0 / 4 Completed</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="prog-bar"></div>
    </div>
  </div>

  <label class="input-label">Enter Your Password</label>
  <input type="text" id="pw-input" placeholder="type your password here..."
    oninput="checkPassword(this.value)" autocomplete="off">

  <div class="strength-label" id="strength-text">Waiting for input...</div>

  <div class="checks-grid">
    <div class="check-item" id="c-length">
      <div class="check-dot"></div>8+ Characters
    </div>
    <div class="check-item" id="c-upper">
      <div class="check-dot"></div>Uppercase Letter (A-Z)
    </div>
    <div class="check-item" id="c-digit">
      <div class="check-dot"></div>Number (0-9)
    </div>
    <div class="check-item" id="c-symbol">
      <div class="check-dot"></div>Symbol (!@#$...)
    </div>
  </div>
    
  </div>

</div>
<script>
function checkPassword(pw) {
  var checks = {
    length: pw.length >= 8,
    upper: /[A-Z]/.test(pw),
    digit: /[0-9]/.test(pw),
    symbol: /[!@#$%^&*()\-_=+\[\]{}|;':",.<>?\/\\]/.test(pw)
  };

  var ids = ['c-length','c-upper','c-digit','c-symbol'];
  var keys = ['length','upper','digit','symbol'];
  var score = 0;

  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (checks[keys[i]]) { el.classList.add('pass'); score++; }
    else { el.classList.remove('pass'); }
  }

  var bar = document.getElementById('prog-bar');
  var label = document.getElementById('score-label');
  var strength = document.getElementById('strength-text');

  label.textContent = score + ' / 4 Completed';

  if (pw.length === 0) {
    bar.style.width = '0%';
    strength.textContent = 'Waiting for input...';
    strength.style.color = '#8b949e';
    return;
  }

  bar.style.width = (score / 4 * 100) + '%';

  if (score <= 1) {
    bar.style.background = '#e74c3c';
    strength.textContent = 'Weak';
    strength.style.color = '#e74c3c';
  } else if (score === 2) {
    bar.style.background = '#f39c12';
    strength.textContent = 'Medium';
    strength.style.color = '#f39c12';
  } else if (score === 3) {
    bar.style.background = '#2ecc71';
    strength.textContent = 'Strong';
    strength.style.color = '#2ecc71';
  } else {
    bar.style.background = '#00e5ff';
    strength.textContent = 'Very Strong!';
    strength.style.color = '#00e5ff';
  }
}
</script>
</body>
</html>
